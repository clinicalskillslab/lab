<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECG Mastery — Cardiac Clinical Skills</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
  }
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #30363d;
    padding-bottom: 14px;
    margin-bottom: 18px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  header h1 span { color: #58a6ff; }
  .scorebar {
    display: flex;
    gap: 18px;
    font-size: 14px;
    color: #8b949e;
  }
  .scorebar b { color: #e6edf3; }
  .case-banner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;
  }
  .case-banner .case-num { font-weight: 600; color: #58a6ff; }
  .case-banner .case-vignette { color: #c9d1d9; font-size: 14px; font-style: italic; }

  .ecg-wrap {
    background: #fff5f5;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 18px;
    overflow-x: auto;
  }
  .ecg-wrap svg { display: block; margin: 0 auto; }

  .workflow {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .step-num {
    background: #1f6feb;
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .step-title { font-size: 17px; font-weight: 600; }
  .step-prompt { color: #8b949e; margin-bottom: 14px; font-size: 14px; }
  .options { display: flex; flex-wrap: wrap; gap: 10px; }
  .option {
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .option:hover:not(:disabled) {
    background: #30363d;
    border-color: #58a6ff;
  }
  .option.correct {
    background: #1a4d2e !important;
    border-color: #2ea043 !important;
    color: #aff5b4;
  }
  .option.wrong {
    background: #4d1a1a !important;
    border-color: #da3633 !important;
    color: #ffa198;
  }
  .option:disabled { cursor: default; opacity: 0.6; }
  .option.correct:disabled, .option.wrong:disabled { opacity: 1; }

  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: rgba(46,160,67,0.12);
    border: 1px solid #2ea043;
    color: #aff5b4;
  }
  .feedback.no {
    background: rgba(218,54,51,0.10);
    border: 1px solid #da3633;
    color: #ffa198;

  .step-history {
    margin-top: 12px;
    padding-top: 12px;

  .step-history .ok-tick { color: #56d364; }

  .actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;

    border: 1px solid #30363d;

  }
  .summary h2 { margin-top: 0; color: #58a6ff; }

    font-size: 48px;

    color: #56d364;
    margin: 14px 0;
  }

  .lead-label {
    font-size: 14px;
    font-weight: 600;
    fill: #57534e;
    font-family: -apple-system, sans-serif;
  }

    font-size: 12px;
    color: #8b949e;
    text-align: center;
    margin-top: 6px;
  }

  @media (max-width: 1000px) {
    .options { flex-direction: column; }
    .option { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ECG <span>Mastery</span> — Structured Interpretation</h1>
    <div class="scorebar">
      <div>Case <b id="caseIdx">1</b> of <b id="caseTotal">8</b></div>
      <div>Score <b id="scoreNow">0</b> / <b id="scoreMax">0</b></div>
    </div>
  </header>

  <div class="case-banner">
    <div>
      <div class="case-num" id="caseTitle">Case 1</div>
      <div class="case-vignette" id="caseVignette"></div>
    </div>
    <div style="font-size:13px;color:#8b949e;">Speed 25 mm/s · Gain 10 mm/mV</div>
  </div>

  <div class="ecg-wrap">
    <svg id="ecg" width="1140" height="700" viewBox="0 0 1140 700"></svg>
  </div>
  <div class="legend">Standard 12-lead layout · Rhythm strip: Lead II</div>

  <div class="workflow" id="workflow"></div>
</div>

<script>
/* =============================================================
   ECG MASTERY — Structured 12-lead interpretation game
   ============================================================= */

/* ---------- ECG WAVEFORM ENGINE ---------- */

// Each lead has a base PQRST morphology (in mV). We then mutate this
// based on pathology before rendering.
const baseMorph = {
  // amplitudes in mV; q/s are negative
  I:   { p: 0.12, q: -0.05, r: 0.90, s: -0.10, t: 0.25 },
  II:  { p: 0.18, q: -0.05, r: 1.20, s: -0.10, t: 0.32 },
  III: { p: 0.08, q: -0.05, r: 0.55, s: -0.20, t: 0.12 },
  aVR: { p: -0.15, q: 0.05, r: -0.70, s: 0.10, t: -0.20 },
  aVL: { p: 0.08, q: -0.05, r: 0.55, s: -0.15, t: 0.15 },
  aVF: { p: 0.15, q: -0.05, r: 0.85, s: -0.15, t: 0.22 },
  V1:  { p: 0.05, q: 0.0,   r: 0.20, s: -0.85, t: -0.10 },
  V2:  { p: 0.10, q: 0.0,   r: 0.45, s: -1.20, t: 0.20 },
  V3:  { p: 0.15, q: -0.05, r: 0.85, s: -0.85, t: 0.30 },
  V4:  { p: 0.18, q: -0.10, r: 1.05, s: -0.30, t: 0.40 },
  V5:  { p: 0.18, q: -0.10, r: 1.15, s: -0.10, t: 0.32 },
  V6:  { p: 0.15, q: -0.10, r: 1.10, s: 0.0,   t: 0.25 }
};

const ALL_LEADS = ["I","II","III","aVR","aVL","aVF","V1","V2","V3","V4","V5","V6"];

// Apply a pathology to base morphology to produce per-lead beat parameters.
function morphForCase(caseDef, lead) {
  let m = { ...baseMorph[lead] };
  m.stOffset = 0;        // default — pathology branches override
  // beat timing defaults (seconds)
  let t = {
    pDur: 0.09, prSeg: 0.07,                 // → PR interval ≈ 160ms
    qDur: 0.02, qrsCore: 0.06, sTail: 0.02,  // → QRS ≈ 100ms
    stSeg: 0.10, tDur: 0.20,                 // → QT ≈ 400ms
    stOffset: 0
  };

  // ----- BBBs widen QRS and twist morphology -----
  if (caseDef.lbbb) {
    t.qrsCore = 0.13; t.sTail = 0.04;        // QRS ~170ms
    if (["V5","V6","I","aVL"].includes(lead)) {
      m.q = 0;                                // no septal Q (loss of septal forces)
      // Don't artificially boost R amplitude — the M-shape morphology *itself*
      // signals LBBB, and a forced 1.3 mV R was clipping panels in lateral leads.
      m.s = -0.05;                            // small "s" trough between r1 and r2
      m.notchedR = true;                      // M-shape rendered in QRS engine
      m.t = -0.30;                            // discordant T
      m.stOffset = -0.10;
    }
    if (["V1","V2","V3"].includes(lead)) {
      m.r = 0.05;
      m.s = -1.30;
      m.notchedS = true;                      // W-shape
      m.t = 0.30;                             // discordant T (positive)
      m.stOffset = 0.10;
    }
  }
  if (caseDef.rbbb) {
    t.qrsCore = 0.12; t.sTail = 0.04;        // QRS ~160ms
    if (["V1","V2"].includes(lead)) {
      m.r = 0.30; m.s = -0.40;
      m.rPrime = 0.85;                        // rsR' (M-shape)
      m.t = -0.25;                            // discordant T
      m.stOffset = -0.05;
    }
    if (["I","V5","V6","aVL"].includes(lead)) {
      m.s = -0.40;                            // slurred broad S
      m.slurredS = true;
    }
  }

  // ----- LVH (Sokolow-Lyon: SV1 + RV5/V6 > 35mm) with strain -----
  if (caseDef.lvh) {
    if (lead === "V1") { m.s = -1.60; }
    if (lead === "V2") { m.s = -1.80; }
    if (lead === "V5") { m.r = 2.40; m.t = -0.30; m.stOffset = -0.10; }
    if (lead === "V6") { m.r = 2.10; m.t = -0.25; m.stOffset = -0.10; }
    if (lead === "I")  { m.r = 1.40; m.t = -0.15; m.stOffset = -0.05; }
    if (lead === "aVL"){ m.r = 1.30; m.t = -0.15; m.stOffset = -0.05; }
  }

  // ----- RVH: dominant R in V1, deep S in V6, RAD, strain V1-V3 -----
  if (caseDef.rvh) {
    if (lead === "V1") { m.r = 1.30; m.s = -0.30; m.t = -0.30; m.stOffset = -0.08; }
    if (lead === "V2") { m.r = 1.00; m.s = -0.50; m.t = -0.20; m.stOffset = -0.05; }
    if (lead === "V3") { m.r = 0.70; m.s = -0.70; }
    if (lead === "V5") { m.r = 0.50; m.s = -0.60; }
    if (lead === "V6") { m.r = 0.40; m.s = -0.80; }
    if (lead === "I")  { m.r = 0.25; m.s = -0.40; }
    if (lead === "III"){ m.r = 1.20; m.s = -0.05; }
    if (lead === "aVF"){ m.r = 1.10; m.s = -0.05; }
    if (lead === "aVL"){ m.r = -0.10; m.s = -0.40; }
  }

  // ----- Anterior STEMI: coved tombstone STE V1-V4, hyperacute T,
  //       small Q (early-evolution), reciprocal inferior depression -----
  if (caseDef.antMI) {
    if (lead === "V1") { m.q = 0;     m.r = 0.10; m.s = -0.45; m.stOffset = 0.18; m.t = 0.30; m.coved = true; }
    if (lead === "V2") { m.q = -0.05; m.r = 0.45; m.s = -0.95; m.stOffset = 0.45; m.t = 0.55; m.coved = true; }
    if (lead === "V3") { m.q = -0.05; m.r = 0.80; m.s = -0.55; m.stOffset = 0.50; m.t = 0.55; m.coved = true; }
    if (lead === "V4") { m.q = -0.10; m.r = 1.00; m.s = -0.20; m.stOffset = 0.40; m.t = 0.45; m.coved = true; }
    if (["II","III","aVF"].includes(lead)) {
      m.stOffset = -0.12;                     // reciprocal depression
    }
  }

  // ----- Inferior MI: coved STE II/III/aVF, modest Q, recip I/aVL -----
  if (caseDef.infMI) {
    if (["II","III","aVF"].includes(lead)) {
      m.q = -0.10; m.r = m.r * 0.75;
      m.stOffset = 0.30; m.t = 0.42; m.coved = true;
    }
    if (["I","aVL"].includes(lead)) {
      m.stOffset = -0.12;                     // reciprocal
    }
  }

  // ----- LAD: tall R in I/aVL, deep S in II/III/aVF -----
  if (caseDef.axis === "LAD") {
    if (lead === "I")  { m.r = 1.10; m.s = -0.05; }
    if (lead === "aVL"){ m.r = 0.90; m.s = -0.05; }
    if (lead === "II") { m.r = 0.30; m.s = -0.80; }
    if (lead === "III"){ m.r = 0.10; m.s = -1.00; }
    if (lead === "aVF"){ m.r = 0.20; m.s = -0.90; }
  }
  // ----- RAD: dominant R inferior, S in I/aVL -----
  if (caseDef.axis === "RAD") {
    if (lead === "I")  { m.r = 0.20; m.s = -0.60; }
    if (lead === "aVL"){ m.r = 0.05; m.s = -0.50; }
    if (lead === "II") { m.r = 1.30; }
    if (lead === "III"){ m.r = 1.20; m.s = 0; }
    if (lead === "aVF"){ m.r = 1.20; }
  }

  return { m, t };
}

// Voltage at time `t` within a beat, given morphology and timing.
function beatVoltage(tSec, m, tim) {
  const pStart = 0;
  const pEnd = pStart + tim.pDur;
  const prEnd = pEnd + tim.prSeg;
  const qEnd = prEnd + tim.qDur;
  const qrsEnd = qEnd + tim.qrsCore;
  const sEnd = qrsEnd + tim.sTail;
  const stEnd = sEnd + tim.stSeg;
  const tEnd = stEnd + tim.tDur;

  // P wave (small lobed bump)
  if (tSec < pEnd) {
    return m.p * Math.sin(Math.PI * (tSec - pStart) / tim.pDur);
  }
  // PR segment
  if (tSec < prEnd) return 0;
  // Q (downstroke)
  if (tSec < qEnd) {
    const f = (tSec - prEnd) / tim.qDur;
    return m.q * f;
  }
  // QRS core: q -> r (-> r' if BBB) -> s
  if (tSec < qrsEnd) {
    const f = (tSec - qEnd) / tim.qrsCore;     // 0..1
    if (m.notchedR) {
      // M-shape: q -> r -> small dip -> r2 -> s
      if (f < 0.30) return m.q + (m.r - m.q) * (f / 0.30);
      if (f < 0.45) return m.r - (m.r * 0.20) * ((f - 0.30) / 0.15);   // notch dip
      if (f < 0.65) return m.r * 0.80 + (m.r * 0.20) * ((f - 0.45) / 0.20); // 2nd peak
      return m.r + (m.s - m.r) * ((f - 0.65) / 0.35);                 // down to S
    }
    if (m.notchedS) {
      // W-shape: q -> small r -> deep s -> small notch -> back
      if (f < 0.20) return m.q + (m.r - m.q) * (f / 0.20);
      if (f < 0.55) return m.r + (m.s - m.r) * ((f - 0.20) / 0.35);
      if (f < 0.75) return m.s + (m.s * -0.20) * ((f - 0.55) / 0.20); // small notch up
      return m.s * 0.85 + (0 - m.s * 0.85) * ((f - 0.75) / 0.25);
    }
    if (m.rPrime) {
      // rsR': q -> small r -> s -> R' (taller) -> down
      if (f < 0.18) return m.q + (m.r - m.q) * (f / 0.18);
      if (f < 0.36) return m.r + (m.s - m.r) * ((f - 0.18) / 0.18);
      if (f < 0.65) return m.s + (m.rPrime - m.s) * ((f - 0.36) / 0.29);
      return m.rPrime + (0 - m.rPrime) * ((f - 0.65) / 0.35);
    }
    if (m.slurredS) {
      // slow broad S
      if (f < 0.22) return m.q + (m.r - m.q) * (f / 0.22);
      if (f < 0.55) return m.r + (m.s - m.r) * ((f - 0.22) / 0.33);
      return m.s + (0 - m.s) * Math.pow((f - 0.55) / 0.45, 1.5);
    }
    // Standard: q -> r (peak ~40%) -> s (~75%) -> J point (= stOffset, so the S wave
    // rebounds smoothly into any ST shift instead of hitting baseline first).
    if (f < 0.30) return m.q + (m.r - m.q) * (f / 0.30);
    if (f < 0.55) return m.r + (m.s - m.r) * ((f - 0.30) / 0.25);
    return m.s + (m.stOffset - m.s) * ((f - 0.55) / 0.45);
  }
  // S tail — hold at the J-point level (= stOffset) so the join is continuous.
  if (tSec < sEnd) return m.stOffset;
  // Coved ST + T as a single smooth tombstone curve (STEMI). The ST and T are
  // not rendered as separate segments — they form one continuous bump from the
  // elevated J point through the T-wave peak back to baseline.
  if (m.coved && tSec < tEnd) {
    const dur = tim.stSeg + tim.tDur;
    const f = (tSec - sEnd) / dur;
    const peakF = 0.58;
    const peakV = m.stOffset + m.t;
    if (f < peakF) {
      return m.stOffset + (peakV - m.stOffset) * (1 - Math.cos(Math.PI * f / peakF)) / 2;
    } else {
      return peakV * (1 + Math.cos(Math.PI * (f - peakF) / (1 - peakF))) / 2;
    }
  }
  // Standard ST segment (flat shelf at stOffset)
  if (tSec < stEnd) return m.stOffset;
  // Standard T wave
  if (tSec < tEnd) {
    const f = (tSec - stEnd) / tim.tDur;
    return m.stOffset * (1 - f) + m.t * Math.sin(Math.PI * f);
  }
  // diastole / TP
  return 0;
}

// Schedule beats for a case. Returns array of { tStart, prOverride?, dropQRS? }.
// Each "beat" represents an atrial event (P wave); dropQRS means the AV node
// failed to conduct that P → QRS (Wenckebach drop, etc.).
function scheduleBeats(caseDef, durSec) {
  const meanBeat = 60 / caseDef.rate;
  const beats = [];
  let cursor = 0.10;

  if (caseDef.wenckebach) {
    // Mobitz I, 4:3 cycle: PR lengthens 0.06 → 0.13 → 0.21 → DROP, then resets
    const prCycle = [0.05, 0.13, 0.21, null];
    let i = 0;
    while (cursor < durSec + 0.5) {
      const pr = prCycle[i % prCycle.length];
      if (pr === null) beats.push({ tStart: cursor, prOverride: 0.07, dropQRS: true });
      else beats.push({ tStart: cursor, prOverride: pr });
      cursor += meanBeat;
      i++;
    }
  } else if (caseDef.firstDegree) {
    // Constant prolonged PR (~260 ms)
    while (cursor < durSec + 0.5) {
      beats.push({ tStart: cursor, prOverride: 0.17 });
      cursor += meanBeat * (0.98 + Math.random() * 0.04);
    }
  } else {
    while (cursor < durSec + 0.5) {
      beats.push({ tStart: cursor });
      if (caseDef.rhythm === "AF") {
        cursor += meanBeat * (0.55 + Math.random() * 0.95);
      } else if (caseDef.rhythm === "AFlutter") {
        cursor += meanBeat * (0.95 + Math.random() * 0.10);
      } else {
        cursor += meanBeat * (0.98 + Math.random() * 0.04);
      }
    }
  }
  return beats;
}

// Build SVG path for a single lead window
// width = pixels, height per lead = pixels
// scaleX: px per second (= 25 mm/s × pxPerMm)
// scaleY: px per mV (= 10 mm/mV × pxPerMm)
function buildLeadPath(caseDef, lead, widthPx, heightPx, pxPerMm) {
  const { m, t } = morphForCase(caseDef, lead);
  const scaleX = 25 * pxPerMm;        // px/sec
  const scaleY = 10 * pxPerMm;        // px/mV
  const yMid = heightPx / 2;
  const durSec = widthPx / scaleX;
  const sampleHz = 500;
  const samples = Math.floor(durSec * sampleHz);

  const beats = scheduleBeats(caseDef, durSec);

  // Render
  let pathD = "";
  for (let i = 0; i <= samples; i++) {
    const tSec = i / sampleHz;
    let v = 0;

    // Find current beat (latest beat whose tStart <= tSec)
    let beat = null;
    for (let b = beats.length - 1; b >= 0; b--) {
      if (tSec >= beats[b].tStart) { beat = beats[b]; break; }
    }

    if (beat) {
      const tInBeat = tSec - beat.tStart;
      const tim = beat.prOverride !== undefined
        ? Object.assign({}, t, { prSeg: beat.prOverride })
        : t;

      if (beat.dropQRS) {
        // Render only the P wave; ventricles silent until next P
        if (tInBeat < tim.pDur) {
          v = m.p * Math.sin(Math.PI * tInBeat / tim.pDur);
        }
      } else if (caseDef.rhythm === "AF") {
        const mNoP = Object.assign({}, m, { p: 0 });
        v = beatVoltage(tInBeat, mNoP, tim);
        const fibAmp = (lead === "V1") ? 0.06 : 0.025;
        const fib = fibAmp * (Math.sin(tSec * 14 * Math.PI) * 0.4
                            + Math.sin(tSec * 22 * Math.PI + 1.7) * 0.3
                            + Math.sin(tSec * 9 * Math.PI + 0.5) * 0.3);
        const inQRS = (tInBeat > tim.pDur + tim.prSeg && tInBeat < tim.pDur + tim.prSeg + tim.qDur + tim.qrsCore + tim.sTail);
        if (!inQRS) v += fib;
      } else if (caseDef.rhythm === "AFlutter") {
        const mNoP = Object.assign({}, m, { p: 0 });
        v = beatVoltage(tInBeat, mNoP, tim);

        // Flutter wave amplitude and polarity by lead.
        // Typical (counter-clockwise) flutter — negative sawtooth in inferior leads,
        // upright in V1 / aVR, low amplitude elsewhere.
        let sawAmp, polarity;
        if (["II","III","aVF"].includes(lead))     { sawAmp = 0.15; polarity =  1; }
        else if (["V1","aVR"].includes(lead))      { sawAmp = 0.07; polarity = -1; }
        else                                        { sawAmp = 0.03; polarity =  1; }

        const flutterHz = 5; // 5 Hz = 300/min atrial
        const phase = (tSec * flutterHz) % 1;

        // Continuous sawtooth: smooth cosine descent (0 → -1) over 85 % of the cycle,
        // then a sharp linear return (-1 → 0) over the last 15 %. No discontinuities.
        let flutter;
        if (phase < 0.85) {
          flutter = -(1 - Math.cos(Math.PI * phase / 0.85)) / 2;
        } else {
          flutter = -1 + (phase - 0.85) / 0.15;
        }
        flutter = flutter * sawAmp * polarity;

        // Suppress flutter during the QRS itself (it'd be lost in the QRS anyway).
        const inQRS = (tInBeat > tim.pDur + tim.prSeg && tInBeat < tim.pDur + tim.prSeg + tim.qDur + tim.qrsCore + tim.sTail);
        if (!inQRS) v += flutter;
      } else {
        v = beatVoltage(tInBeat, m, tim);
      }
    }

    // tiny baseline noise
    v += (Math.random() - 0.5) * 0.008;

    const x = i / sampleHz * scaleX;
    const y = yMid - v * scaleY;
    pathD += (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1) + " ";
  }
  return pathD;
}

/* ---------- ECG GRID + LAYOUT ---------- */

function renderECG(caseDef) {
  const svg = document.getElementById("ecg");
  svg.innerHTML = "";
  const NS = "http://www.w3.org/2000/svg";

  const pxPerMm = 7;
  const cols = 4;
  const rows = 3;
  const leadW = 40 * pxPerMm;          // 40 mm wide → ~1.6 s, ~2.5 beats @ 75 bpm
  const leadH = 22 * pxPerMm;          // 22 mm tall → ±1.1 mV (room for tall R waves)
  const gridW = cols * leadW;
  const gridH = rows * leadH;
  const rhythmH = 22 * pxPerMm;
  const totalW = gridW;
  const totalH = gridH + rhythmH + 12;

  svg.setAttribute("width", totalW);
  svg.setAttribute("height", totalH);
  svg.setAttribute("viewBox", `0 0 ${totalW} ${totalH}`);

  // Grid pattern
  const defs = document.createElementNS(NS, "defs");
  defs.innerHTML = `
    <pattern id="smallGrid" width="${pxPerMm}" height="${pxPerMm}" patternUnits="userSpaceOnUse">
      <path d="M ${pxPerMm} 0 L 0 0 0 ${pxPerMm}" fill="none" stroke="#f8c8c8" stroke-width="0.4"/>
    </pattern>
    <pattern id="bigGrid" width="${pxPerMm*5}" height="${pxPerMm*5}" patternUnits="userSpaceOnUse">
      <rect width="${pxPerMm*5}" height="${pxPerMm*5}" fill="url(#smallGrid)"/>
      <path d="M ${pxPerMm*5} 0 L 0 0 0 ${pxPerMm*5}" fill="none" stroke="#e89090" stroke-width="0.9"/>
    </pattern>
  `;
  svg.appendChild(defs);

  const bg = document.createElementNS(NS, "rect");
  bg.setAttribute("width", totalW);
  bg.setAttribute("height", totalH);
  bg.setAttribute("fill", "url(#bigGrid)");
  svg.appendChild(bg);

  // Lead order (standard cabrera-ish 4×3)
  const layout = [
    ["I","aVR","V1","V4"],
    ["II","aVL","V2","V5"],
    ["III","aVF","V3","V6"]
  ];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const lead = layout[r][c];
      const x0 = c * leadW;
      const y0 = r * leadH;

      // Wrap each lead's trace in a nested <svg> with explicit width/height —
      // this creates a clipping viewport so a very tall LVH R wave (or a deep S)
      // can't bleed into the row above/below.
      const leadSvg = document.createElementNS(NS, "svg");
      leadSvg.setAttribute("x", x0 + 3);
      leadSvg.setAttribute("y", y0);
      leadSvg.setAttribute("width", leadW - 6);
      leadSvg.setAttribute("height", leadH);

      const path = document.createElementNS(NS, "path");
      const d = buildLeadPath(caseDef, lead, leadW - 6, leadH, pxPerMm);
      path.setAttribute("d", d);
      path.setAttribute("stroke", "#0d0d0d");
      path.setAttribute("stroke-width", "1.4");
      path.setAttribute("fill", "none");
      path.setAttribute("stroke-linejoin", "round");
      leadSvg.appendChild(path);
      svg.appendChild(leadSvg);

      // Lead label (in the outer svg so it sits on top of the grid, not inside the clip)
      const lbl = document.createElementNS(NS, "text");
      lbl.setAttribute("x", x0 + 8);
      lbl.setAttribute("y", y0 + 18);
      lbl.setAttribute("class", "lead-label");
      lbl.textContent = lead;
      svg.appendChild(lbl);
    }
  }

  // Rhythm strip — Lead II, full width, with single calibration pulse at start
  const rhythmY = gridH + 12;
  const calW = 5 * pxPerMm;
  const calH = 10 * pxPerMm;
  const calY = rhythmY + rhythmH / 2;
  const calX = 4;

  const cal = document.createElementNS(NS, "path");
  const calD = `M ${calX} ${calY} L ${calX} ${calY - calH/2} L ${calX + calW} ${calY - calH/2} L ${calX + calW} ${calY} L ${calX + calW + 4} ${calY}`;
  cal.setAttribute("d", calD);
  cal.setAttribute("stroke", "#0d0d0d");
  cal.setAttribute("stroke-width", "1.4");
  cal.setAttribute("fill", "none");
  svg.appendChild(cal);

  const rPath = document.createElementNS(NS, "path");
  const rTraceX = calX + calW + 8;
  const rD = buildLeadPath(caseDef, "II", totalW - rTraceX - 4, rhythmH, pxPerMm);
  rPath.setAttribute("d", rD);
  rPath.setAttribute("transform", `translate(${rTraceX},${rhythmY})`);
  rPath.setAttribute("stroke", "#0d0d0d");
  rPath.setAttribute("stroke-width", "1.4");
  rPath.setAttribute("fill", "none");
  svg.appendChild(rPath);

  const rLbl = document.createElementNS(NS, "text");
  rLbl.setAttribute("x", 8);
  rLbl.setAttribute("y", rhythmY + 18);
  rLbl.setAttribute("class", "lead-label");
  rLbl.textContent = "II  (rhythm)";
  svg.appendChild(rLbl);
}

      if (i === "AnteriorSTEMI") return "ST elevation V1–V4 with reciprocal inferior depression — anterior STEMI (LAD).";
      if (i === "InferiorMI")    return "ST elevation II/III/aVF with reciprocal I/aVL depression — inferior STEMI (RCA territory in 80%).";

    }
  },
  {
    key: "diagnosis",
    title: "Step 8 · Final synthesis",
    prompt: "Putting it all together — what's the overall ECG diagnosis?",
    options: caseDef => {
      // Build options dynamically: correct dx + 3 distractors
      const truth = caseDef.diagnosis;
      const pool = CASES.map(c => c.diagnosis).filter(d => d !== truth);
      // Pick 3 distractors deterministically by case index for replayability
      const distractors = shuffle([...pool]).slice(0, 3);
      const all = shuffle([truth, ...distractors]);
      return all.map(d => ({ label: d, correct: d === truth }));
    },
    explain: caseDef => caseDef.teach
  }
];

function bandRate(r) {
  if (r < 60) return "Bradycardia (<60)";
  if (r <= 100) return "Normal (60–100)";
  if (r <= 150) return "Tachycardia (100–150)";
  return "Marked tachycardia (>150)";
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------- GAME STATE ---------- */

const state = {
  caseIdx: 0,
  stepIdx: 0,
  score: 0,
  maxScore: 0,
  caseHistory: [],   // {step, ok, label}
  finished: false
};

function startCase() {
  state.stepIdx = 0;
  state.caseHistory = [];
  const c = CASES[state.caseIdx];
  document.getElementById("caseIdx").textContent = state.caseIdx + 1;
  document.getElementById("caseTotal").textContent = CASES.length;
  document.getElementById("caseTitle").textContent = c.title;
  document.getElementById("caseVignette").textContent = c.vignette;
  renderECG(c);
  renderStep();
}

function renderStep() {
  const c = CASES[state.caseIdx];
  const step = STEPS[state.stepIdx];
  const opts = step.options(c);

  const container = document.getElementById("workflow");
  container.innerHTML = `
    <div class="step-header">
      <span class="step-num">${state.stepIdx + 1}</span>
      <span class="step-title">${step.title}</span>
    </div>
    <div class="step-prompt">${step.prompt}</div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <div class="actions" id="actions"></div>
    ${state.caseHistory.length ? renderHistory() : ""}
  `;

  const optsEl = document.getElementById("opts");
  opts.forEach((o, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = o.label;
    btn.onclick = () => answer(i, opts);
    optsEl.appendChild(btn);
  });
}

function renderHistory() {
  const items = state.caseHistory.map(h => {
    const icon = h.ok ? '<span class="ok-tick">✓</span>' : '<span class="no-cross">✗</span>';
    return `<div>${icon} <b>${h.step}</b>: ${h.label}</div>`;
  }).join("");
  return `<div class="step-history"><div style="margin-bottom:6px;color:#c9d1d9;font-weight:600;">This case so far</div>${items}</div>`;
}

function answer(idx, opts) {
  const c = CASES[state.caseIdx];
  const step = STEPS[state.stepIdx];
  const optsEl = document.getElementById("opts");
  const buttons = [...optsEl.querySelectorAll("button")];
  const chosen = opts[idx];
  const correctIdx = opts.findIndex(o => o.correct);

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add("correct");
    if (i === idx && !chosen.correct) b.classList.add("wrong");
  });

  state.maxScore++;
  if (chosen.correct) state.score++;
  state.caseHistory.push({
    step: step.title.replace(/^Step \d+ · /, ""),
    ok: chosen.correct,
    label: chosen.correct ? chosen.label : `${chosen.label} (correct: ${opts[correctIdx].label})`
  });

  document.getElementById("scoreNow").textContent = state.score;
  document.getElementById("scoreMax").textContent = state.maxScore;

  const fb = document.getElementById("fb");
  fb.classList.add("show");
  fb.classList.add(chosen.correct ? "ok" : "no");
  fb.innerHTML = (chosen.correct ? "<b>Correct.</b> " : "<b>Not quite.</b> ") + step.explain(c);

  const actions = document.getElementById("actions");
  if (state.stepIdx < STEPS.length - 1) {
    const next = document.createElement("button");
    next.className = "btn";
    next.textContent = "Next step →";
    next.onclick = () => { state.stepIdx++; renderStep(); };
    actions.appendChild(next);
  } else {
    // End of case
    if (state.caseIdx < CASES.length - 1) {
      const next = document.createElement("button");
      next.className = "btn";
      next.textContent = "Next case →";
      next.onclick = () => { state.caseIdx++; startCase(); };
      actions.appendChild(next);
    } else {
      const finish = document.createElement("button");
      finish.className = "btn";
      finish.textContent = "Finish & see results";
      finish.onclick = showSummary;
      actions.appendChild(finish);
    }
  }

  // Update history block live
  const wf = document.getElementById("workflow");
  if (!wf.querySelector(".step-history")) {
    wf.insertAdjacentHTML("beforeend", renderHistory());
  } else {
    wf.querySelector(".step-history").outerHTML = renderHistory();
  }
}

function showSummary() {
  const pct = Math.round((state.score / state.maxScore) * 100);
  let badge = "Keep practising — review each case's teaching points.";
  if (pct >= 90) badge = "Outstanding — examiner-ready.";
  else if (pct >= 75) badge = "Strong performance — polish the trickier patterns.";
  else if (pct >= 60) badge = "Solid foundation — drill the abnormal traces.";

  document.getElementById("workflow").innerHTML = `
    <div class="summary">
      <h2>Session complete</h2>
      <div class="big-score">${state.score} / ${state.maxScore}</div>
      <div style="font-size:18px;color:#c9d1d9;">${pct}% — ${badge}</div>
      <p style="color:#8b949e;margin-top:18px;">You worked through ${CASES.length} cases applying the structured approach: rate → rhythm → AV conduction → axis → QRS width → hypertrophy → ischaemia → synthesis.</p>
      <button class="btn" onclick="restart()">Restart with new ECGs</button>
    </div>
  `;
  document.querySelector(".case-banner").style.display = "none";
  document.querySelector(".ecg-wrap").style.display = "none";
  document.querySelector(".legend").style.display = "none";
}

function restart() {
  state.caseIdx = 0;
  state.stepIdx = 0;
  state.score = 0;
  state.maxScore = 0;
  state.caseHistory = [];
  document.querySelector(".case-banner").style.display = "";
  document.querySelector(".ecg-wrap").style.display = "";
  document.querySelector(".legend").style.display = "";
  document.getElementById("scoreNow").textContent = 0;
  document.getElementById("scoreMax").textContent = 0;
  // Re-shuffle case order for replayability
  CASES.sort(() => Math.random() - 0.5);
  startCase();
}

/* ---------- BOOT ---------- */
startCase();
</script>
</body>
</html>
